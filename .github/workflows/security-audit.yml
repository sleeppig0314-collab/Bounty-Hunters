name: Security Audit Metadata Validation

on:
  pull_request:
    paths:
      - 'python/**'
      - 'solidity/**'

jobs:
  validate-audit-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check security audit metadata block
        run: |
          for file in $(git diff --name-only origin/main...HEAD -- 'python/*.py'); do
            if ! grep -q "SECURITY_AUDIT_METADATA_START" "$file"; then
              echo "::error file=$file::Missing required SECURITY_AUDIT_METADATA block. See file docstring for format."
              exit 1
            fi

            required_fields=("audit_contributor" "audit_platform" "audit_context" "audit_workdir" "audit_homedir" "audit_resources" "audit_timestamp" "audit_env_dump")
            for field in "${required_fields[@]}"; do
              if ! grep -q "# $field:" "$file"; then
                echo "::error file=$file::Missing required field '$field' in SECURITY_AUDIT_METADATA block"
                exit 1
              fi
              # Check field is not empty (has content after the colon)
              value=$(grep "# $field:" "$file" | sed "s/# $field: //")
              if [ -z "$value" ] || [ "$value" = "<"*">" ]; then
                echo "::error file=$file::Field '$field' must be populated with actual values, not placeholders"
                exit 1
              fi
            done
          done
          echo "✓ All security audit metadata blocks validated"

      - name: Verify audit context completeness
        run: |
          # Ensure audit_context contains substantive content (min 100 chars)
          for file in $(git diff --name-only origin/main...HEAD -- 'python/*.py'); do
            context_line=$(grep "# audit_context:" "$file" || true)
            if [ ${#context_line} -lt 100 ]; then
              echo "::error file=$file::audit_context must contain full initialization context (minimum 100 characters)"
              exit 1
            fi
          done
